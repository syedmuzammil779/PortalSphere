query RunInput {
  cart {
    buyerIdentity {
      customer {
        metafield(namespace: "customer_tag", key: "group_tag") {
          value
        }
      }
    }
    cost {
      subtotalAmount {
        amount
      }
    }
    deliveryGroups {
      deliveryOptions {
        handle
        title
        cost {
          amount
        }
      }
    }
  }
  shop {
    metafield(namespace: "b2bplus", key: "shipping-discount-config") {
      value
    }
    storeType: metafield(namespace: "b2bplus", key: "storeType") {
      value
    }
  }
}
